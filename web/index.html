<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ruang Dosen 4 — Attendance Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            paper: '#eef0ec', paperdark: '#14181a',
            surface: '#ffffff', surfacedark: '#1b2224',
            surface2: '#f6f7f3', surfacedark2: '#202829',
            ink: '#1f2621', inkdark: '#e7ece7',
            muted: '#5c6660', muteddark: '#93a098',
            line: '#d9dcd3', linedark: '#2c3436',
            brass: '#92721f', brassdark: '#d9b768',
            brasssoft: '#f0e6c8', brasssoftdark: '#2c2513',
            present: '#2a6b4a', presentdark: '#63c090',
            presentsoft: '#dcece1', presentsoftdark: '#17271e',
            absentc: '#8a5a3b', absentcdark: '#d99b6c',
            absentsoft: '#f1e6dc', absentsoftdark: '#2a1f16',
            /* Per-status colors for the 4 known manual-status presets --
               anything else (custom-typed status) falls back to brass. */
            sibuk: '#b3261e', sibukdark: '#f2897e',
            sibuksoft: '#f8dcd8', sibuksoftdark: '#3a1613',
            tugasbelajar: '#2d4a7a', tugasbelajardark: '#8aa8d9',
            tugasbelajarsoft: '#dde5f2', tugasbelajarsoftdark: '#1c2536',
            cuti: '#7a4a6b', cutidark: '#c98fc0',
            cutisoft: '#f0e0ec', cutisoftdark: '#33212f',
            rapat: '#2a6b6b', rapatdark: '#63c0c0',
            rapatsoft: '#dcecec', rapatsoftdark: '#173030',
          },
          fontFamily: {
            plate: ['"Iowan Old Style"', '"Palatino Linotype"', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-paper dark:bg-paperdark text-ink dark:text-inkdark min-h-screen">
  <div class="max-w-6xl mx-auto px-5 py-10 pb-20">

    <header class="flex flex-wrap items-start justify-between gap-4 pb-6 border-b border-line dark:border-linedark mb-6">
      <div>
        <h1 class="font-plate text-3xl font-semibold tracking-tight [text-wrap:balance]">Ruang Dosen 4</h1>
      </div>
      <div class="text-right text-xs text-muted dark:text-muteddark shrink-0">
        <a href="#" id="sign-in-link" class="hover:underline hover:text-ink dark:hover:text-inkdark">Masuk</a>
        <span id="signed-in-info" hidden>
          <span id="user-email"></span> &middot; <button id="sign-out" class="hover:underline">Keluar</button>
        </span>
      </div>
    </header>

    <div id="notice"></div>

    <!-- The xl:grid-* classes here are added/removed by app.js (setSidebarLayout), not static --
         the two-column split should only reserve sidebar width while there's actually a status
         panel to show, not for every signed-out visitor. -->
    <div id="layout-grid">

      <aside id="status-wrap" class="mb-6 p-5 bg-surface dark:bg-surfacedark border border-line dark:border-linedark rounded shadow-sm" hidden>
        <h2 class="font-plate text-base font-semibold mb-1">Status Saya</h2>
        <p class="text-xs text-muted dark:text-muteddark mb-3">Pilih status, tambahkan catatan bila perlu, lalu klik Simpan.</p>

        <div class="flex flex-wrap gap-2 mb-3" role="group" aria-label="Status">
          <button type="button" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="">Otomatis</button>
          <button type="button" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="Sibuk">Sibuk</button>
          <button type="button" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="Tugas Belajar">Tugas Belajar</button>
          <button type="button" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="Cuti">Cuti</button>
          <button type="button" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="Rapat">Rapat</button>
          <button type="button" id="status-custom-toggle" class="status-toggle px-3 py-1.5 rounded border text-xs font-semibold border-line dark:border-linedark hover:bg-surface2 dark:hover:bg-surfacedark2" data-status="__custom__">Lainnya&hellip;</button>
        </div>

        <input id="status-custom-input" type="text" placeholder="Tulis status, lalu tekan Enter" autocomplete="off" maxlength="40" hidden
          class="w-full px-3.5 py-2.5 mb-3 rounded border border-line dark:border-linedark bg-surface dark:bg-surfacedark text-sm placeholder:text-muted dark:placeholder:text-muteddark focus:outline-none focus:ring-2 focus:ring-brass dark:focus:ring-brassdark" />

        <input id="status-note-input" type="text" placeholder="Catatan (opsional)" autocomplete="off" maxlength="280" disabled
          class="w-full px-3.5 py-2.5 mb-3 rounded border border-line dark:border-linedark bg-surface dark:bg-surfacedark text-sm placeholder:text-muted dark:placeholder:text-muteddark focus:outline-none focus:ring-2 focus:ring-brass dark:focus:ring-brassdark disabled:opacity-50" />

        <button type="button" id="save-status-btn" class="w-full px-4 py-2.5 mb-4 rounded bg-brass dark:bg-brassdark text-white dark:text-paperdark text-sm font-semibold hover:opacity-90">Simpan</button>

        <button type="button" id="privacy-toggle" aria-pressed="false"
          class="flex items-center gap-2.5 pt-4 border-t border-line dark:border-linedark text-sm w-full text-left">
          <span id="eye-open" class="shrink-0 text-muted dark:text-muteddark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span id="eye-closed" hidden class="shrink-0 text-brass dark:text-brassdark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.53 13.53 0 0 0 1 11s4 7 11 7a10.94 10.94 0 0 0 5.39-1.61M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </span>
          <span class="text-muted dark:text-muteddark">Sembunyikan status otomatis dari publik &mdash; status manual di atas tetap tampil</span>
        </button>

        <p class="mt-4 pt-4 border-t border-line dark:border-linedark text-xs text-muted dark:text-muteddark">
          Untuk mendaftarkan perangkat, kunjungi <a href="devices.html" class="text-brass dark:text-brassdark hover:underline">halaman perangkat</a>.
        </p>
      </aside>

      <div id="board-wrap">
        <div id="board" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <p class="text-muted dark:text-muteddark text-center py-8 col-span-full">Memuat...</p>
        </div>

        <p id="last-updated" class="mt-8 text-xs text-muted dark:text-muteddark [font-variant-numeric:tabular-nums]"></p>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
